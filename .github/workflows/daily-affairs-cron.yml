name: Daily Current Affairs Auto-Update

on:
  schedule:
    # Run daily at 7 AM UTC (12:30 PM IST)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-current-affairs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check secrets
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "❌ ERROR: CRON_SECRET not set in GitHub secrets!"
            exit 1
          fi
          echo "✅ CRON_SECRET is configured"
      
      - name: Fetch Latest News (Attempt 1)
        id: affairs1
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "$VERCEL_URL/api/cron/daily-affairs")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP_CODE=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "RESPONSE=$BODY" >> $GITHUB_OUTPUT
          echo "Response: $BODY"
          [ "$HTTP_CODE" = "200" ] || exit 1
        env:
          VERCEL_URL: https://dailytutors.vercel.app
        continue-on-error: true
      
      - name: Fetch Latest News (Retry after 30s)
        if: steps.affairs1.outcome == 'failure'
        run: |
          sleep 30
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://dailytutors.vercel.app/api/cron/daily-affairs")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Retry Response (HTTP $HTTP_CODE): $BODY"
          [ "$HTTP_CODE" = "200" ] || exit 1
      
      - name: Log Status
        if: always()
        run: |
          if [ "${{ steps.affairs1.outcome }}" = "success" ]; then
            echo "✅ Current affairs update succeeded"
            echo "Response: ${{ steps.affairs1.outputs.RESPONSE }}"
          else
            echo "⚠️ Current affairs update encountered issues but will retry"
          fi
